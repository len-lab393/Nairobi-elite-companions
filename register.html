<!DOCTYPE html>
<html>
<head>
<title>Register</title>
</head>

<body>

<h2>Create Account</h2>

<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="phone" placeholder="Phone Number"><br><br>
<input id="city" placeholder="City"><br><br>
<input id="age" type="number" placeholder="Age"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<select id="role">
<option value="escort">Escort (requires payment)</option>
</select>

<br><br>
<button onclick="register()">Register</button>

<script>

function register(){

const user = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
phone: document.getElementById("phone").value,
city: document.getElementById("city").value,
age: document.getElementById("age").value,
password: document.getElementById("password").value,
role: document.getElementById("role").value,
plan: null,
active: false,
expiresAt: null
};

localStorage.setItem("user", JSON.stringify(user));

alert("Account created. Subscribe to publish.");

window.location.href = "pay.html";

}

</script>

</body>
</html>
