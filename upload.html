<h2>Create Escort Profile</h2>

<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<input id="age" placeholder="Age"><br><br>
<input id="location" placeholder="Location"><br><br>

<button onclick="saveProfile()">Publish Profile</button>

<script>
function saveProfile(){

const user = JSON.parse(localStorage.getItem("user"));

/* MUST be escort */
if(!user || user.role !== "escort"){
alert("Escort account required");
window.location.href="register.html";
return;
}

/* MUST have paid */
if(!user.plan){
alert("Subscription required to publish profile");
window.location.href="pay.html";
return;
}

let profiles = JSON.parse(localStorage.getItem("profiles")) || [];

profiles.push({
email: user.email,
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
age: document.getElementById("age").value,
location: document.getElementById("location").value
});

localStorage.setItem("profiles", JSON.stringify(profiles));

alert("Profile published!");
}
  </script>
