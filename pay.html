<!DOCTYPE html>
<html>
<head>
<title>Buy Membership</title>
</head>

<body>

<h2>Escort Subscription</h2>

<button onclick="subscribe('2days')">KSh 150 / 2 days</button>
<button onclick="subscribe('week')">KSh 400 / week</button>
<button onclick="subscribe('month')">KSh 1200 / month</button>

<script>
function subscribe(plan){

let user = JSON.parse(localStorage.getItem("user"));
user.plan = plan;
localStorage.setItem("user", JSON.stringify(user));

/* activate escort profile */
let profiles = JSON.parse(localStorage.getItem("profiles")) || [];

profiles.forEach(p=>{
if(p.email === user.email){
p.active = true;
}
});

localStorage.setItem("profiles", JSON.stringify(profiles));

alert("Subscription active. Profile published!");

window.location.href="dashboard.html";
}
</script>

</body>
</html>
