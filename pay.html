<script>
async function subscribe(plan,amount){

const phone = document.getElementById("phone").value.trim()

const escortId = localStorage.getItem("escortId")

if(!phone){
alert("Enter phone")
return
}

if(!escortId){
alert("Login first")
return
}

try{

const res = await fetch("https://backend-production-6cd4.up.railway.app/mpesa/stkpush",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone,
amount:amount,
plan:plan,
escortId:escortId
})
})

const data = await res.json()
console.log(data)

alert("STK sent. Check phone.")

}catch(err){
console.error(err)
alert("Network error")
}

}
  </script>
