<!DOCTYPE html>
<html>
<head>
<title>Buy Membership</title>
</head>

<body>

<h2>Choose Membership</h2>

<button onclick="buyPlan('2day')">KSh 150 / 2 days</button><br><br>
<button onclick="buyPlan('weekly')">KSh 400 / week</button><br><br>
<button onclick="buyPlan('monthly')">KSh 1200 / month</button><br><br>

<script>
function buyPlan(planName) {

  let user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    alert("Login first");
    window.location.href="login.html";
    return;
  }

  user.plan = planName;

  localStorage.setItem("user", JSON.stringify(user));

  alert("Payment successful. Membership activated.");
  window.location.href="dashboard.html";
}
</script>

</body>
</html>
