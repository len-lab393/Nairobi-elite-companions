<!DOCTYPE html>

<html>
<head>
<title>Escort Subscription</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
text-align:center;
padding:40px;
}

input{
padding:10px;
width:250px;
margin-bottom:20px;
}

button{
padding:12px 20px;
margin:10px;
cursor:pointer;
font-size:16px;
}

</style>

</head>

<body>

<h2>Buy Escort Membership</h2>

<input id="phone" placeholder="Enter Phone (07XXXXXXXX)" />

<br>

<button onclick="subscribe('2days',150)">KSh 150 / 2 Days</button>

<button onclick="subscribe('week',500)">KSh 500 / 1 Week</button>

<button onclick="subscribe('month',1500)">KSh 1500 / 1 Month</button>

<script>

async function subscribe(plan, amount){

const phone = document.getElementById("phone").value

if(!phone){

alert("Enter phone number")

return

}

try{

const response = await fetch("https://backend-production-6cd4.up.railway.app/mpesa/stkpush",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
phone:phone,
amount:amount,
plan:plan
})

})

const data = await response.json()

console.log(data)

alert("STK Push Sent. Check your phone.")

}catch(err){

console.log(err)

alert("Payment request failed")

}

}

</script>

</body>
</html>
