<!DOCTYPE html>
<html>
<head>
<title>Buy Membership</title>
</head>

<body>

<h2>Escort Subscription</h2>

<button onclick="subscribe('2days')">KSh 150 / 2 days</button>
<button onclick="subscribe('week')">KSh 400 / week</button>
<button onclick="subscribe('month')">KSh 1200 / month</button>

<script>
function subscribe(days){

let user = JSON.parse(localStorage.getItem("user"));

const now = new Date();

/* calculate expiry */
now.setDate(now.getDate() + days);

user.plan = days + "days";
user.active = true;
user.expiresAt = now;

localStorage.setItem("user", JSON.stringify(user));

alert("Subscription active. Account published.");

window.location.href="dashboard.html";
}

/* plans */
function pay2days(){ subscribe(2); }
function payWeek(){ subscribe(7); }
function payMonth(){ subscribe(30); }
  </script>

</body>
</html>
