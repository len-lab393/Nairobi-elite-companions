<!DOCTYPE html>
<html>
<head>
<title>Buy Membership</title>
</head>

<body>

<h2>Escort Membership</h2>

<button onclick="pay()">Pay KSh 150 (2 days)</button>
<button onclick="payWeek()">Pay KSh 400 (1 week)</button>
<button onclick="payMonth()">Pay KSh 1200 (1 month)</button>

<script>
function updatePlan(plan){
let user = JSON.parse(localStorage.getItem("user"));
user.plan = plan;
localStorage.setItem("user", JSON.stringify(user));
alert("Payment successful");
window.location.href="dashboard.html";
}

function pay(){ updatePlan("2days"); }
function payWeek(){ updatePlan("week"); }
function payMonth(){ updatePlan("month"); }
</script>

</body>
</html>
