<html>

<body>
  <h2>Register</h2>
  <input id="regUsername" placeholder="Username" />
  <input id="regEmail" placeholder="Email" />
  <input id="regPassword" type="password" placeholder="Password" />
  <button onclick="register()">Register</button>

  <h2>Login</h2>
  <input id="loginUsername" placeholder="Username" />
  <input id="loginPassword" type="password" placeholder="Password" />
  <button onclick="login()">Login</button>

  <h2>Profile</h2>
  <div id="profile"></div>

  <h3>Update Profile</h3>
<input id="updateEmail" placeholder="New Email" />
<input type="file" id="updatePhotos" multiple accept="image/*" />
<input type="file" id="updateVideo" accept="video/*" />
<button onclick="updateProfileFiles()">Update Profile</button>

// ----------------- LOGIN -----------------
async function login() {
  const username = document.getElementById("loginUsername").value;
  const password = document.getElementById("loginPassword").value;

  const res = await fetch("/api/escorts/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (data.token) {
    token = data.token;
    alert("Login successful");
    fetchProfile();
  } else {
    alert(data.error);
  }
}

// ----------------- FETCH PROFILE -----------------
async function fetchProfile() {
  if (!token) return alert("Not logged in");

  const res = await fetch("/api/escorts/me", {
    headers: { "Authorization": "Bearer " + token }
  });
  const profile = await res.json();
  document.getElementById("profile").innerText = JSON.stringify(profile, null, 2);
}

// ----------------- UPDATE PROFILE -----------------
async function updateProfile() {
  if (!token) return alert("Not logged in");

  const email = document.getElementById("updateEmail").value;
  const photos = document.getElementById("updatePhotos").value.split(",").map(p => p.trim());
  const video = document.getElementById("updateVideo").value;

  const res = await fetch("/api/escorts/me", {
    method: "PUT",
    headers: { 
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token 
    },
    body: JSON.stringify({ email, photos, video })
  });

  const data = await res.json();
  document.getElementById("profile").innerText = JSON.stringify(data, null, 2);
  alert("Profile updated");
}
</script>
</body>
</html>
