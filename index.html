<!DOCTYPE html>

<html>
<head>
<title>Escort Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h2>Register</h2>
<input id="regUsername" placeholder="Username">
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>
<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2>Your Profile</h2>
<pre id="profile"></pre>

<hr>

<h3>Update Profile</h3>

<input id="updateEmail" placeholder="New Email"><br><br>

Photos: <input type="file" id="updatePhotos" multiple accept="image/*"><br><br>

Video: <input type="file" id="updateVideo" accept="video/*"><br><br>

<button onclick="updateProfile()">Upload Photos / Video</button>

<script>

let token = ""
const API = "https://backend-production-6cd4.up.railway.app/api/escorts"

async function register(){

const username = document.getElementById("regUsername").value
const email = document.getElementById("regEmail").value
const password = document.getElementById("regPassword").value

const res = await fetch(API + "/register",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body: JSON.stringify({username,email,password})
})

const data = await res.json()
alert(data.message || data.error)

}

async function login(){

const username = document.getElementById("loginUsername").value
const password = document.getElementById("loginPassword").value

const res = await fetch(API + "/login",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body: JSON.stringify({username,password})
})

const data = await res.json()

if(data.token){
token = data.token
alert("Login successful")
fetchProfile()
}else{
alert(data.error)
}

}

async function fetchProfile(){

const res = await fetch(API + "/me",{
headers:{
Authorization: "Bearer " + token
}
})

const data = await res.json()

document.getElementById("profile").innerText =
JSON.stringify(data,null,2)

}

async function updateProfile(){

const email = document.getElementById("updateEmail").value
const photos = document.getElementById("updatePhotos").files
const video = document.getElementById("updateVideo").files[0]

const form = new FormData()

if(email) form.append("email",email)

for(let i=0;i<photos.length;i++){
form.append("photos",photos[i])
}

if(video){
form.append("video",video)
}

const res = await fetch(API + "/me",{
method:"PUT",
headers:{
Authorization: "Bearer " + token
},
body: form
})

const data = await res.json()

alert("Profile updated")
document.getElementById("profile").innerText =
JSON.stringify(data,null,2)

}

</script>

</body>
</html>
