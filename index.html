<!DOCTYPE html>
<html>

<head>
<title>Nairobi Elites</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:gold;
}

.nav-buttons button{
margin-left:10px;
padding:8px 14px;
border:none;
background:gold;
color:black;
font-weight:bold;
cursor:pointer;
}

.hero{
padding:40px;
text-align:center;
background:#1a1a1a;
}

.escorts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:8px;
text-align:center;
}

.card img{
width:100%;
border-radius:6px;
}

.card button{
margin-top:10px;
padding:6px 10px;
background:gold;
border:none;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<div class="logo">Nairobi Elites</div>

<div class="nav-buttons">

<button onclick="goRegister()">Register</button>

<button onclick="goLogin()">Login</button>

</div>

</header>


<section class="hero">

<h1>Nairobi Escort Directory</h1>

<p>Find verified escorts in Nairobi</p>

</section>


<section class="escorts" id="escortList">

<div class="card">

<img src="https://via.placeholder.com/200">

<h3>Sophia</h3>

<p>Nairobi</p>

<button onclick="window.location.href='sophia.html'">View</button>

</div>


<div class="card">

<img src="https://via.placeholder.com/200">

<h3>Maya</h3>

<p>Nairobi</p>

<button onclick="window.location.href='maya.html'">View</button>

</div>

</section>


<footer>

<p>© Nairobi Elites</p>

</footer>


<script>

function goRegister(){

window.location.href="register.html"

}

function goLogin(){

window.location.href="login.html"

}

</script>


</body>

</html>
