<!DOCTYPE html>
<html>

<head>
<title>Nairobi Elites</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
}

button{
padding:8px 14px;
background:gold;
border:none;
cursor:pointer;
}

.escorts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:6px;
text-align:center;
}

.card img{
width:100%;
}

</style>

</head>

<body>

<header>

<h2>Nairobi Elites</h2>

<div>

<button onclick="window.location.href='register.html'">Register</button>

<button onclick="window.location.href='login.html'">Login</button>

</div>

</header>

<h3 style="padding-left:20px">Available Escorts</h3>

<div class="escorts" id="escortList"></div>

<script>

function loadEscorts(){

let users = JSON.parse(localStorage.getItem("users")) || []

let container=document.getElementById("escortList")

container.innerHTML=""

users.forEach(user=>{

if(user.active){

container.innerHTML+=`

<div class="card">

<img src="${user.photo1 || 'https://via.placeholder.com/200'}">

<h3>${user.name}</h3>

<p>${user.city}</p>

<p>${user.phone}</p>

</div>

`

}

})

}

loadEscorts()

</script>

</body>

</html>
