if(!user){
window.location.href="login.html";
}

if(user.role === "escort" && !user.active){
alert("Account not published. Subscribe.");
window.location.href="pay.html";

</script>
<h2>Escort Dashboard</h2>

<p>Subscription active ✅</p>

<button onclick="goUpload()">Create / Edit Profile</button>

<script>

/* SECURITY LOCK */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
alert("Login first");
window.location.href="login.html";
}

if(user.role !== "escort"){
alert("Escort account required");
window.location.href="index.html";
}

if(!user.plan){
alert("Subscription required");
window.location.href="pay.html";
}

/* NAVIGATION */
function goUpload(){
window.location.href="upload.html";
}

</script>
<script>
let user = JSON.parse(localStorage.getItem("user"));

if(user && user.expiresAt){

const now = new Date();
const expiry = new Date(user.expiresAt);

if(now > expiry){
user.active = false;
user.plan = null;

localStorage.setItem("user", JSON.stringify(user));

alert("Subscription expired. Account hidden.");
}
}
</script>
