<!DOCTYPE html>
<html>

<head>
<title>Dashboard</title>
</head>

<body>

<h2>Escort Dashboard</h2>

<div id="profile"></div>

<script>

let user = JSON.parse(localStorage.getItem("currentUser"))

if(!user){

alert("Login first")

window.location.href="login.html"

}

document.getElementById("profile").innerHTML=`

<h3>${user.name}</h3>

<p>${user.city}</p>

<p>${user.phone}</p>

`

</script>

</body>

</html>
