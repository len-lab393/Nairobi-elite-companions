<!DOCTYPE html>
<html>
<head>
<title>Escort Profiles</title>
</head>

<body>

<h2>Available Escorts</h2>

<div id="profiles"></div>
<script>
let profiles = JSON.parse(localStorage.getItem("profiles")) || [];

let html = "";

/* show only active profiles */
profiles.filter(p => p.active).forEach(p => {
html += `
<div style="border:1px solid black;margin:10px;padding:10px;">
Name: ${p.name}<br>
Gender: ${p.gender}<br>
Age: ${p.age}<br>
Location: ${p.location}<br>
Phone: ${p.phone}
</div>
`;
});

document.getElementById("profiles").innerHTML =
html || "No escorts available";
  </script>
  <script>
let user = JSON.parse(localStorage.getItem("user"));

if(user && user.expiresAt){

const now = new Date();
const expiry = new Date(user.expiresAt);

if(now > expiry){
user.active = false;
user.plan = null;

localStorage.setItem("user", JSON.stringify(user));

alert("Subscription expired. Account hidden.");
}
}
  </script>
</body>
</html>
