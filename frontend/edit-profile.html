<!DOCTYPE html>
<html>
<head>
<title>Edit Escort Profile</title>
</head>

<body>

<h2>Edit Profile</h2>

<form id="editForm">

<input type="text" id="name" placeholder="Name" required>
<br><br>

<input type="email" id="email" placeholder="Email" required>
<br><br>

<input type="text" id="phone" placeholder="Phone" required>
<br><br>

<input type="number" id="age" placeholder="Age">
<br><br>

<input type="text" id="area" placeholder="Area">
<br><br>

<input type="text" id="city" placeholder="City">
<br><br>

<h3>Upload Photos</h3>

<input type="file" id="photo1" accept="image/*" required>
<br><br>

<input type="file" id="photo2" accept="image/*" required>
<br><br>

<h3>Upload Video (optional)</h3>

<input type="file" id="video" accept="video/*">
<br><br>

<button type="submit">Save Profile</button>

</form>

<script>

const escortId = localStorage.getItem("escortId")

document.getElementById("editForm").addEventListener("submit", async function(e){

e.preventDefault()

const formData = new FormData()

formData.append("name",document.getElementById("name").value)
formData.append("email",document.getElementById("email").value)
formData.append("phone",document.getElementById("phone").value)
formData.append("age",document.getElementById("age").value)
formData.append("area",document.getElementById("area").value)
formData.append("city",document.getElementById("city").value)

formData.append("photo1",document.getElementById("photo1").files[0])
formData.append("photo2",document.getElementById("photo2").files[0])

const videoFile = document.getElementById("video").files[0]

if(videoFile){
formData.append("video",videoFile)
}

const response = await fetch(
`https://your-backend-url/escort/edit/${escortId}`,
{
method:"PUT",
body:formData
}
)

const data = await response.json()

alert("Profile updated!")

})

</script>

</body>
</html>
