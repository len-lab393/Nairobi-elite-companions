<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid #333;
padding:10px;
}
</style>
</head>

<body>

<h1>Admin Dashboard</h1>

<button onclick="loadUsers()">Load Data</button>

<table>
<thead>
<tr>
<th>Email</th>
<th>Plan</th>
<th>Expiry</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script>

function loadUsers(){

fetch("https://backend-production-6cd4.up.railway.app/admin-data")
.then(r=>r.json())
.then(users=>{

let html="";

users.forEach(u=>{
html+=`
<tr>
<td>${u.email}</td>
<td>${u.plan||"None"}</td>
<td>${u.membershipExpires?new Date(u.membershipExpires).toLocaleString():"None"}</td>
</tr>`;
});

document.getElementById("data").innerHTML=html;

});

}

</script>

</body>
</html>
